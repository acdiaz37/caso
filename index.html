<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reproductor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Fondo animado */
    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: drift 12s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: #7c3aed; top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: #2563eb; bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: #db2777; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(40px, -30px) scale(1.05); }
      66%       { transform: translate(-20px, 40px) scale(0.95); }
    }

    /* Partículas */
    #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* Tarjeta principal */
    .card {
      position: relative; z-index: 10;
      width: min(520px, 95vw);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 40px 36px 36px;
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Visualizador */
    #visualizer {
      width: 100%;
      height: 120px;
      border-radius: 16px;
      background: rgba(0,0,0,0.3);
      margin-bottom: 28px;
      display: block;
    }

    /* Info del track */
    .track-info {
      text-align: center;
      margin-bottom: 26px;
    }
    .track-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-subtitle {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Barra de progreso */
    .progress-wrap {
      margin-bottom: 8px;
      cursor: pointer;
      position: relative;
    }
    .progress-bg {
      height: 5px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      overflow: visible;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      border-radius: 10px;
      transition: width 0.1s linear;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -6px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(124,58,237,0.8);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .progress-wrap:hover .progress-fill::after { opacity: 1; }

    /* Tiempos */
    .times {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 24px;
      padding: 0 2px;
    }

    /* Controles principales */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      color: rgba(255,255,255,0.6);
    }
    .btn:hover { opacity: 1; transform: scale(1.1); color: #fff; }
    .btn:active { transform: scale(0.93); }

    .btn-play {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      box-shadow: 0 8px 24px rgba(124,58,237,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-play:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 32px rgba(124,58,237,0.7);
    }
    .btn-play.playing {
      animation: pulse-ring 1.8s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 8px 24px rgba(124,58,237,0.5), 0 0 0 0 rgba(124,58,237,0.4); }
      70%  { box-shadow: 0 8px 24px rgba(124,58,237,0.5), 0 0 0 18px rgba(124,58,237,0); }
      100% { box-shadow: 0 8px 24px rgba(124,58,237,0.5), 0 0 0 0 rgba(124,58,237,0); }
    }

    /* Volumen */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .volume-row svg { color: rgba(255,255,255,0.45); flex-shrink: 0; }

    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,0.12);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px rgba(124,58,237,0.7);
    }

    /* Ecualizador decorativo (barras animadas) */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
      margin-left: auto;
    }
    .eq-bar {
      width: 3px;
      background: linear-gradient(to top, #7c3aed, #2563eb);
      border-radius: 2px;
      animation: eq-anim 0.8s ease-in-out infinite alternate;
      opacity: 0.3;
    }
    .eq-bars.active .eq-bar { opacity: 1; }
    .eq-bar:nth-child(1) { animation-delay: 0.0s; height: 8px; }
    .eq-bar:nth-child(2) { animation-delay: 0.1s; height: 14px; }
    .eq-bar:nth-child(3) { animation-delay: 0.2s; height: 10px; }
    .eq-bar:nth-child(4) { animation-delay: 0.05s; height: 18px; }
    .eq-bar:nth-child(5) { animation-delay: 0.15s; height: 12px; }
    @keyframes eq-anim {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }

    /* Línea separadora */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 22px 0;
    }

    /* Footer info */
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<canvas id="particles"></canvas>

<div class="card">
  <canvas id="visualizer"></canvas>

  <div class="track-info">
    <div class="track-title">Heridas familiares que el orgullo no cura</div>
    <div class="track-subtitle">Audio &nbsp;·&nbsp; M4A</div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bg">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
  <div class="times">
    <span id="timeElapsed">0:00</span>
    <span id="timeDuration">–:––</span>
  </div>

  <div class="controls">
    <!-- Retroceder 10s -->
    <button class="btn" id="btnBack" title="−10s">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
        <text x="8" y="14" font-size="5" fill="currentColor" stroke="none" font-family="sans-serif">10</text>
      </svg>
    </button>

    <!-- Play / Pause -->
    <button class="btn btn-play" id="btnPlay" title="Reproducir">
      <svg id="iconPlay" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
      <svg id="iconPause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
      </svg>
    </button>

    <!-- Adelantar 10s -->
    <button class="btn" id="btnFwd" title="+10s">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.95"/>
        <text x="8" y="14" font-size="5" fill="currentColor" stroke="none" font-family="sans-serif">10</text>
      </svg>
    </button>
  </div>

  <div class="volume-row">
    <!-- Icono volumen -->
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
    <div class="eq-bars" id="eqBars">
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="footer-row">
    <span>Web Audio API · Canvas Visualizer</span>
    <span id="statusText">Listo</span>
  </div>
</div>

<audio id="audio" src="Heridas_familiares_que_el_orgullo_no_cura.m4a" preload="metadata"></audio>

<script>
// ── Partículas de fondo ──────────────────────────────────────────
(function () {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, dots = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for (let i = 0; i < 70; i++) {
    dots.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      a: Math.random() * 0.5 + 0.1,
    });
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
      if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${d.a})`;
      ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

// ── Audio + Visualizador ─────────────────────────────────────────
const audio   = document.getElementById('audio');
const btnPlay = document.getElementById('btnPlay');
const iconPl  = document.getElementById('iconPlay');
const iconPa  = document.getElementById('iconPause');
const fill    = document.getElementById('progressFill');
const wrap    = document.getElementById('progressWrap');
const elapsed = document.getElementById('timeElapsed');
const dur     = document.getElementById('timeDuration');
const volSl   = document.getElementById('volumeSlider');
const eqBars  = document.getElementById('eqBars');
const status  = document.getElementById('statusText');

const vCanvas = document.getElementById('visualizer');
const vCtx    = vCanvas.getContext('2d');

let audioCtx, analyser, source, dataArray, bufLen;
let vizReady = false;

function initAudio() {
  if (vizReady) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  bufLen    = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufLen);
  source    = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  vizReady  = true;
}

function resizeViz() {
  vCanvas.width  = vCanvas.offsetWidth  * devicePixelRatio;
  vCanvas.height = vCanvas.offsetHeight * devicePixelRatio;
}
window.addEventListener('resize', resizeViz);
resizeViz();

function drawVisualizer() {
  requestAnimationFrame(drawVisualizer);
  const W = vCanvas.width, H = vCanvas.height;
  vCtx.clearRect(0, 0, W, H);

  if (!vizReady) {
    // Estado inactivo: línea plana suave
    vCtx.beginPath();
    vCtx.strokeStyle = 'rgba(255,255,255,0.1)';
    vCtx.lineWidth = 2;
    vCtx.moveTo(0, H / 2);
    vCtx.lineTo(W, H / 2);
    vCtx.stroke();
    return;
  }

  analyser.getByteFrequencyData(dataArray);

  const barW  = (W / bufLen) * 2.2;
  let x = 0;

  for (let i = 0; i < bufLen; i++) {
    const v   = dataArray[i] / 255;
    const bH  = v * H * 0.85;
    const hue = 260 + v * 60;
    const grad = vCtx.createLinearGradient(0, H - bH, 0, H);
    grad.addColorStop(0, `hsla(${hue},90%,65%,0.9)`);
    grad.addColorStop(1, `hsla(${hue},90%,40%,0.4)`);
    vCtx.fillStyle = grad;
    vCtx.beginPath();
    vCtx.roundRect(x, H - bH, barW - 1, bH, [3, 3, 0, 0]);
    vCtx.fill();
    x += barW + 1;
  }
}
drawVisualizer();

// Play / Pause
function setPlaying(playing) {
  iconPl.style.display  = playing ? 'none' : 'block';
  iconPa.style.display  = playing ? 'block' : 'none';
  btnPlay.classList.toggle('playing', playing);
  eqBars.classList.toggle('active', playing);
  status.textContent = playing ? 'Reproduciendo' : 'Pausado';
}

btnPlay.addEventListener('click', () => {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (audio.paused) { audio.play(); setPlaying(true); }
  else              { audio.pause(); setPlaying(false); }
});

document.getElementById('btnBack').addEventListener('click', () => {
  audio.currentTime = Math.max(0, audio.currentTime - 10);
});
document.getElementById('btnFwd').addEventListener('click', () => {
  audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
});

// Progreso
function fmt(s) {
  if (!isFinite(s)) return '–:––';
  const m = Math.floor(s / 60);
  const sec = String(Math.floor(s % 60)).padStart(2, '0');
  return `${m}:${sec}`;
}

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  fill.style.width = pct + '%';
  elapsed.textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  dur.textContent = fmt(audio.duration);
});
audio.addEventListener('ended', () => setPlaying(false));

wrap.addEventListener('click', e => {
  const rect = wrap.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * (audio.duration || 0);
});

// Volumen
volSl.addEventListener('input', () => { audio.volume = volSl.value; });

// Teclado
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
  if (e.code === 'ArrowLeft')  document.getElementById('btnBack').click();
  if (e.code === 'ArrowRight') document.getElementById('btnFwd').click();
});
</script>
</body>
</html>
